version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8004:8004"
    env_file:
      - ../../../../.env
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  frontend:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3004:3004"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    restart: unless-stopped
